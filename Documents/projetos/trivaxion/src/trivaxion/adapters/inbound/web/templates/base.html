<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trivaxion{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <style>
        .nav-link {
            @apply border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium;
        }
        .nav-link.active {
            @apply border-blue-500 text-gray-900;
        }
    </style>
    <script>
        // Inject token from cookie to localStorage on page load
        window.addEventListener('DOMContentLoaded', function() {
            const cookieToken = getCookie('access_token');
            if (cookieToken && !localStorage.getItem('access_token')) {
                localStorage.setItem('access_token', cookieToken);
                console.log('Token injected from cookie to localStorage');
            }
        });
        
        // Helper function to get cookie value
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
        
        // Add authorization header to all HTMX requests using localStorage
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('access_token');
            if (token) {
                evt.detail.headers['Authorization'] = 'Bearer ' + token;
            }
        });
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    {% if user %}
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="/" class="text-xl font-bold text-blue-600 hover:text-blue-700 transition-colors">
                            Trivaxion
                        </a>
                    </div>
                    <div class="hidden sm:ml-8 sm:flex sm:space-x-8">
                        <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                            Dashboard
                        </a>
                        <a href="/analyses/new" class="nav-link {% if active_page == 'new_analysis' %}active{% endif %}">
                            Nova Análise
                        </a>
                        <a href="/analyses" class="nav-link {% if active_page == 'analyses' %}active{% endif %}">
                            Análises
                        </a>
                        <a href="/companies" class="nav-link {% if active_page == 'companies' %}active{% endif %}">
                            Empresas
                        </a>
                        {% if user.get('role') in ['ADMIN', 'MANAGER'] %}
                        <a href="/users" class="nav-link {% if active_page == 'users' %}active{% endif %}">
                            Usuários
                        </a>
                        {% endif %}
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="ml-3 relative" x-data="{ open: false }">
                        <button @click="open = !open" class="flex items-center text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            <span class="mr-2">{{ user.full_name }}</span>
                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                        </button>
                        <div x-show="open" @click.away="open = false" class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5">
                            <div class="py-1">
                                <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Perfil</a>
                                <a href="/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Sair</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="{% if user %}py-6{% endif %}">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
